<h1>workbook round-trip test</h1>
<div class="sub">Edit the body, click Save, then refresh. Edits should persist.</div>
<textarea id="content"></textarea>
<div>
  <button id="save">Save</button>
  <span id="status" class="status"></span>
</div>

<script>
(async () => {
  const ta = document.getElementById('content');
  const btn = document.getElementById('save');
  const status = document.getElementById('status');
  const banner = document.getElementById('banner');

  // Restore last-saved textarea content from a body data attribute.
  ta.value = document.body.dataset.content || '';

  // Detect the daemon and confirm we were loaded with a token URL.
  let daemonOk = false;
  try {
    // Same-origin fetch — works regardless of which port the
    // daemon randomized to at startup. We're already loaded from
    // the daemon's origin (location.host), so /health is just there.
    const r = await fetch('/health', { cache: 'no-store' });
    daemonOk = r.ok;
  } catch {}
  const boundToDaemon = location.protocol === 'http:' && location.pathname.startsWith('/wb/');
  if (!daemonOk || !boundToDaemon) {
    banner.classList.add('show');
    btn.disabled = true;
    status.textContent = daemonOk ? '(open via workbooksd to enable save)' : '(no daemon)';
    return;
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    status.textContent = 'saving…';

    document.body.dataset.content = ta.value;
    const html = '<!doctype html>\n' + document.documentElement.outerHTML;

    try {
      // Same-origin PUT; ./save resolves to /wb/<token>/save.
      const r = await fetch('./save', {
        method: 'PUT',
        headers: { 'content-type': 'text/html' },
        body: html,
      });
      status.textContent = r.ok ? 'saved ✓' : `error: ${r.status}`;
    } catch (e) {
      status.textContent = 'error: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  });
})();
</script>
