<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Squircle (Apple-style rounded-square; rx ≈ 22.5% of side) -->
  <rect width="64" height="64" rx="14" fill="#7c2d12"/>
  <!-- Notebook emoji centered. Font stack falls through to whichever
       emoji font the host has; glyph appearance will vary by OS but
       the squircle background keeps it recognizable as a workbook. -->
  <text x="32" y="46"
        text-anchor="middle"
        font-size="38"
        font-family="-apple-system, 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif">📓</text>
</svg>
