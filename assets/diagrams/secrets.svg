<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="secrets-title secrets-desc">
  <title id="secrets-title">How workbook secrets stay safe</title>
  <desc id="secrets-desc">User pastes an API key once. The daemon stores it in the OS keychain, namespaced by the workbook file's path. From then on, the agent or any code in the page asks the daemon to make outbound HTTPS calls; the daemon splices the key into the right header and forwards the request. Browser code never sees the value. Per-secret domain allowlists, declared in the workbook file itself, prevent the same daemon from being abused as an open relay.</desc>
  <defs>
    <style>
      .bg { fill: #0a0a0a; }
      .label-sans { font: 500 14px Inter,system-ui,sans-serif; fill: #f5f5f5; }
      .label-meta { font: 600 11px Inter,system-ui,sans-serif; fill: #6b7280; letter-spacing: 0.08em; text-transform: uppercase; }
      .label-mono { font: 500 12px "JetBrains Mono","SF Mono",ui-monospace,monospace; fill: #a8a8a8; letter-spacing: 0.02em; }
      .label-mono-bright { font: 500 12px "JetBrains Mono","SF Mono",ui-monospace,monospace; fill: #f5f5f5; letter-spacing: 0.02em; }
      .label-rose { font: 500 12px "JetBrains Mono","SF Mono",ui-monospace,monospace; fill: #f87171; letter-spacing: 0.02em; }
      .node { fill: #111111; stroke: #27272a; stroke-width: 1; rx: 10; ry: 10; }
      .node-vault { fill: #0e1411; stroke: #1d3a2c; stroke-width: 1; rx: 10; ry: 10; }
      .arrow-line { stroke: #6b7280; stroke-width: 1.4; fill: none; }
      .arrow-accent { stroke: #34d399; stroke-width: 1.6; fill: none; }
      .arrow-block { stroke: #f87171; stroke-width: 1.6; fill: none; stroke-dasharray: 4 4; }
      .accent-fill { fill: #34d399; }
      .rose-fill { fill: #f87171; }
    </style>
    <marker id="tip-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="tip-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <marker id="tip-block" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="580"/>

  <!-- Browser -->
  <rect class="node" x="60" y="80" width="280" height="240"/>
  <text x="80" y="112" class="label-meta">BROWSER · YOUR PAGE</text>
  <text x="80" y="146" class="label-sans">paste once, then handles only</text>
  <line x1="80" y1="160" x2="320" y2="160" stroke="#1f1f1f" stroke-width="1"/>
  <text x="80" y="190" class="label-mono">wb.secret.set("FAL_API_KEY", v)</text>
  <text x="80" y="212" class="label-mono">wb.secret.list()  → ["FAL_API_KEY"]</text>
  <text x="80" y="234" class="label-mono">wb.secret.preview() → "fa••xyzy"</text>
  <text x="80" y="256" class="label-mono">wb.fetch({url, auth:{secretId}})</text>
  <text x="80" y="290" class="label-mono" fill="#34d399">value lives here for ~10ms.</text>

  <!-- Daemon -->
  <rect class="node" x="430" y="80" width="340" height="380"/>
  <text x="450" y="112" class="label-meta">WORKBOOKSD</text>
  <text x="450" y="146" class="label-sans">secrets &amp; outbound calls</text>
  <line x1="450" y1="160" x2="750" y2="160" stroke="#1f1f1f" stroke-width="1"/>

  <text x="450" y="194" class="label-mono-bright">/secret/set</text>
  <text x="450" y="214" class="label-mono">→ OS keychain · per-workbook hash</text>

  <text x="450" y="250" class="label-mono-bright">/secret/preview</text>
  <text x="450" y="270" class="label-mono">→ "fa••••••••xyzy" · daemon-side mask</text>

  <text x="450" y="306" class="label-mono-bright">/proxy</text>
  <text x="450" y="326" class="label-mono">→ check domain allowlist</text>
  <text x="450" y="346" class="label-mono">→ splice secret into header</text>
  <text x="450" y="366" class="label-mono">→ forward · return response</text>

  <text x="450" y="402" class="label-mono-bright">/save</text>
  <text x="450" y="422" class="label-mono">→ scan body for any active secret</text>
  <text x="450" y="442" class="label-mono">→ refuse (409) on substring hit</text>

  <!-- Keychain (vault) -->
  <rect class="node-vault" x="430" y="490" width="340" height="60"/>
  <text x="450" y="514" class="label-meta" fill="#34d399">OS KEYCHAIN</text>
  <text x="450" y="534" class="label-mono">macOS · Linux Secret Service · Windows CM</text>

  <line x1="600" y1="460" x2="600" y2="490" stroke="#34d399" stroke-width="1.4"/>

  <!-- Upstream -->
  <rect class="node" x="860" y="80" width="280" height="160"/>
  <text x="880" y="112" class="label-meta">UPSTREAM · ALLOWLISTED</text>
  <text x="880" y="146" class="label-sans">api.fal.run · *.fal.run</text>
  <line x1="880" y1="160" x2="1120" y2="160" stroke="#1f1f1f" stroke-width="1"/>
  <text x="880" y="190" class="label-mono">Authorization: Key ••••••••</text>
  <text x="880" y="212" class="label-mono" fill="#34d399">request signed by daemon</text>

  <!-- Refused -->
  <rect class="node" x="860" y="280" width="280" height="160"/>
  <text x="880" y="312" class="label-meta">REFUSED · OFF ALLOWLIST</text>
  <text x="880" y="346" class="label-sans">evil.com / api.unknown / …</text>
  <line x1="880" y1="360" x2="1120" y2="360" stroke="#1f1f1f" stroke-width="1"/>
  <text x="880" y="390" class="label-rose">403 — secret not allowed here</text>
  <text x="880" y="412" class="label-mono">workbook config is the policy.</text>

  <!-- Arrows -->
  <!-- browser → daemon (set / list / preview / fetch) -->
  <path class="arrow-line" d="M 340 200 C 380 200, 400 200, 430 200" marker-end="url(#tip-r)"/>
  <text x="345" y="190" class="label-mono" fill="#6b7280">requests</text>

  <!-- daemon → upstream (allowed) -->
  <path class="arrow-accent" d="M 770 200 C 810 200, 830 200, 860 160" marker-end="url(#tip-accent)"/>
  <text x="780" y="180" class="label-mono" fill="#34d399">allow</text>

  <!-- daemon → upstream (refused) -->
  <path class="arrow-block" d="M 770 360 C 810 360, 830 360, 860 360" marker-end="url(#tip-block)"/>
  <text x="780" y="350" class="label-mono" fill="#f87171">block</text>

  <!-- Legend at bottom -->
  <line x1="60" y1="500" x2="340" y2="500" stroke="#1f1f1f" stroke-width="1"/>
  <text x="60" y="528" class="label-meta">VALUE NEVER LEAVES THE DAEMON</text>
  <text x="60" y="552" class="label-mono">page holds capability handles only</text>
</svg>
