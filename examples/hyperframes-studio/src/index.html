<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hyperframes-studio · workbook</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Hide every workbook custom element by default. They're data
         carriers, not visual content; without this the save handler's
         refresh of <wb-doc> textContent shows thousands of chars of
         base64 on top of the app. !important so author CSS can't
         accidentally re-show them. -->
    <style>
      wb-workbook, wb-doc, wb-memory, wb-data, wb-history,
      wb-cell, wb-input, wb-output, wb-agent, wb-chat, wb-system, wb-tool {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-page text-fg antialiased">
    <!-- Workbook runtime root. The single <wb-doc> declares the
         persistent CRDT state for the studio (composition + asset
         registry, both managed via Loro inside one doc). The runtime
         registers a LoroDocHandle here at mount; the studio's
         loroBackend.svelte.js reads it via window.__wbRuntime. State
         lives in this element on disk — no IndexedDB. -->
    <wb-workbook>
      <wb-doc id="hyperframes-state" format="loro" history-horizon="200"></wb-doc>
    </wb-workbook>

    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
