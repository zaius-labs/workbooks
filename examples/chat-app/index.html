<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>chat · workbook</title>
<link rel="stylesheet" href="../_shared/design.css" id="workbook-design-css" />
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--font-sans); }
  .app {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr) 320px;
    grid-template-rows: 44px minmax(0, 1fr);
    grid-template-areas: "header header header" "leftnav main rightpanel";
    height: 100vh; min-height: 0;
    transition: grid-template-columns var(--t-mid) var(--ease-out);
  }
  .app[data-left-open="false"]  { grid-template-columns: 0 minmax(0, 1fr) 320px; }
  .app[data-right-open="false"] { grid-template-columns: 280px minmax(0, 1fr) 0; }
  .app[data-left-open="false"][data-right-open="false"] { grid-template-columns: 0 minmax(0, 1fr) 0; }
  .leftnav, .rightpanel { overflow: hidden; }

  .app-header {
    grid-area: header;
    display: flex; align-items: center; gap: var(--s-3);
    padding: 0 var(--s-4); border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  .brand { font-family: var(--font-mono); font-size: var(--t-sm); font-weight: 600; letter-spacing: 0.04em; color: var(--ink); }
  .brand .accent { color: var(--accent); }
  .grow { flex: 1; }
  .icon-btn { background: transparent; border: 1px solid transparent; color: var(--ink-2); padding: 4px 8px; border-radius: var(--radius); cursor: pointer; font-size: var(--t-base); }
  .icon-btn:hover { background: var(--bg-soft); color: var(--ink); }
  .icon-btn[aria-pressed="true"] { color: var(--ink); }

  .mode-pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border: 1px solid var(--line); border-radius: 999px; font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-2); }
  .mode-pill .glyph { color: var(--accent); }
  .key-state { font-family: var(--font-mono); font-size: var(--t-xs); padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); }
  .key-state.set   { color: var(--ok);  border-color: color-mix(in srgb, var(--ok) 35%, transparent); }
  .key-state.unset { color: var(--err); border-color: color-mix(in srgb, var(--err) 35%, transparent); }

  .leftnav {
    grid-area: leftnav;
    border-right: 1px solid var(--line);
    background: var(--bg);
    display: flex; flex-direction: column;
    min-width: 0;
  }
  .leftnav-section {
    font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: var(--s-4) var(--s-5) var(--s-2);
  }
  .leftnav-item {
    display: grid; grid-template-columns: 20px 1fr; align-items: baseline; gap: 8px;
    width: 100%; text-align: left;
    background: transparent; border: 0; border-left: 2px solid transparent;
    padding: 8px var(--s-5);
    font-family: var(--font-sans); font-size: var(--t-sm); color: var(--ink-2);
    cursor: pointer;
  }
  .leftnav-item:hover { background: var(--bg-soft); color: var(--ink); }
  .leftnav-item.active { background: var(--bg-soft); color: var(--ink); border-left-color: var(--accent); }
  .leftnav-item .glyph { font-size: var(--t-base); color: var(--accent); }
  .leftnav-item .name  { display: block; }
  .leftnav-item .desc  { display: block; grid-column: 2; font-size: var(--t-xs); color: var(--ink-3); margin-top: 2px; }
  .key-input { padding: 0 var(--s-5) var(--s-4); }
  .key-input .hint { font-size: var(--t-xs); color: var(--ink-3); margin-bottom: 4px; }
  .key-input input {
    width: 100%; box-sizing: border-box;
    padding: 6px 8px; font-family: var(--font-mono); font-size: var(--t-xs);
    border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg);
    color: var(--ink);
  }
  .key-input input:focus { outline: 1px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .small-btn {
    width: 100%; padding: 6px 8px; cursor: pointer;
    border: 1px solid var(--line); background: var(--bg); color: var(--ink-2);
    border-radius: var(--radius); font-family: var(--font-mono); font-size: var(--t-xs);
  }
  .small-btn:hover { background: var(--bg-soft); color: var(--ink); border-color: var(--line-2); }

  .main { grid-area: main; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .chat-scroll { flex: 1; overflow-y: auto; }
  .chat-inner { max-width: 760px; margin: 0 auto; padding: var(--s-6) var(--s-5); }

  .turn { margin: 0 0 var(--s-6); }
  .turn-meta {
    font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
  }
  .turn.msg-user .turn-meta { color: var(--ink-2); }
  .turn.msg-assistant .turn-meta { color: var(--accent); }
  .turn-text { line-height: 1.55; font-size: var(--t-base); color: var(--ink); }
  .turn-text.raw { white-space: pre-wrap; }
  .turn.msg-user .turn-text { color: var(--ink); white-space: pre-wrap; }
  .turn.streaming .turn-text:last-of-type::after {
    content: "▍"; color: var(--accent); margin-left: 1px;
    animation: wb-pulse 0.9s var(--ease-out) infinite;
  }

  /* Markdown rendering inside assistant text segments. Keep tight
     vertical rhythm — chat density matters more than print spacing. */
  .turn-text > *:first-child { margin-top: 0; }
  .turn-text > *:last-child  { margin-bottom: 0; }
  .turn-text p   { margin: 0 0 8px; }
  .turn-text h1, .turn-text h2, .turn-text h3, .turn-text h4 {
    margin: 12px 0 6px; font-weight: 600; line-height: 1.3;
  }
  .turn-text h1 { font-size: var(--t-xl); }
  .turn-text h2 { font-size: var(--t-lg); }
  .turn-text h3 { font-size: var(--t-base); color: var(--ink-2); }
  .turn-text h4 { font-size: var(--t-sm); color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.04em; }
  .turn-text ul, .turn-text ol { margin: 0 0 8px; padding-left: 22px; }
  .turn-text li { margin: 2px 0; }
  .turn-text code {
    font-family: var(--font-mono); font-size: 0.92em;
    background: var(--bg-soft); border: 1px solid var(--line);
    border-radius: 3px; padding: 1px 5px; color: var(--ink);
  }
  .turn-text pre {
    margin: 8px 0; padding: 10px 12px; overflow: auto;
    background: var(--bg-soft); border: 1px solid var(--line);
    border-radius: var(--radius);
    font-family: var(--font-mono); font-size: var(--t-sm);
    line-height: 1.5; color: var(--ink);
  }
  .turn-text pre code { background: transparent; border: 0; padding: 0; }
  .turn-text a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .turn-text a:hover { text-decoration-thickness: 2px; }
  .turn-text strong { font-weight: 600; }
  .turn-text em { font-style: italic; }
  .turn-text blockquote {
    margin: 8px 0; padding: 4px 12px; color: var(--ink-2);
    border-left: 2px solid var(--line);
  }
  .turn-text hr { border: 0; border-top: 1px solid var(--line); margin: 12px 0; }
  .turn-text table {
    border-collapse: collapse; margin: 8px 0; font-size: var(--t-sm);
  }
  .turn-text th, .turn-text td {
    border: 1px solid var(--line); padding: 4px 8px; text-align: left;
  }
  .turn-text th { background: var(--bg-soft); font-weight: 600; }

  .tool-step {
    margin: 8px 0; border: 1px solid var(--line); border-radius: var(--radius);
    background: var(--bg-soft); font-family: var(--font-mono); font-size: var(--t-xs);
    overflow: hidden;
  }
  .tool-step-head {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; cursor: pointer; color: var(--ink-2);
    border-bottom: 1px solid transparent;
  }
  .tool-step.open .tool-step-head { border-bottom-color: var(--line); }
  .tool-step-head .arrow { color: var(--ink-3); transition: transform var(--t-fast) var(--ease-out); }
  .tool-step.open .tool-step-head .arrow { transform: rotate(90deg); }
  .tool-step-head .name { color: var(--ink); font-weight: 600; }
  .tool-step-head .args-preview { color: var(--ink-3); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-step-body { padding: 8px 10px; display: none; }
  .tool-step.open .tool-step-body { display: block; }
  .tool-step .label { color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; margin-bottom: 4px; }
  .tool-step pre { margin: 0 0 8px; white-space: pre-wrap; word-break: break-all; color: var(--ink); }
  .tool-step pre.result { color: var(--ink-2); max-height: 280px; overflow: auto; background: var(--bg); padding: 6px 8px; border-radius: var(--radius); border: 1px solid var(--line); }

  .compose {
    border-top: 1px solid var(--line); padding: var(--s-4) var(--s-5) var(--s-5); background: var(--bg);
  }
  .compose-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: end; gap: 8px; }
  .compose textarea {
    flex: 1; resize: none; min-height: 36px; max-height: 192px;
    padding: 8px 12px; box-sizing: border-box;
    border: 1px solid var(--line); border-radius: var(--radius);
    font-family: var(--font-sans); font-size: var(--t-base); color: var(--ink);
    background: var(--bg);
  }
  .compose textarea:focus { outline: 1px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .send-btn, .stop-btn {
    width: 36px; height: 36px; border-radius: var(--radius); cursor: pointer;
    border: 1px solid var(--line); background: var(--bg); color: var(--ink);
    font-size: var(--t-base);
  }
  .send-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .stop-btn:hover { background: var(--err); color: white; border-color: var(--err); }

  .rightpanel {
    grid-area: rightpanel; border-left: 1px solid var(--line); background: var(--bg);
    overflow-y: auto;
  }
  .panel-section { padding: var(--s-4) var(--s-5); border-bottom: 1px solid var(--line); }
  .panel-section h3 { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 var(--s-2); font-weight: 600; }
  .panel-meta { display: grid; gap: 4px; font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-2); }
  .panel-meta strong { color: var(--ink); font-weight: 600; }
  .panel-system { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-2); white-space: pre-wrap; line-height: 1.5; }
  .tool-list { display: grid; gap: 4px; font-family: var(--font-mono); font-size: var(--t-xs); }
  .tool-list .t-name { color: var(--ink); font-weight: 600; }
  .tool-list .t-desc { color: var(--ink-3); margin-left: 8px; }

  .vfs-tree { font-family: var(--font-mono); font-size: var(--t-xs); }
  .vfs-tree .empty { color: var(--ink-4); font-style: italic; padding: 4px 0; }
  .vfs-row {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 3px 6px; border-radius: var(--radius);
    color: var(--ink-2); cursor: pointer;
  }
  .vfs-row:hover { background: var(--bg-soft); color: var(--ink); }
  .vfs-row .size { color: var(--ink-4); font-feature-settings: "tnum"; }

  .boot-status {
    position: fixed; left: 50%; top: 40%; transform: translateX(-50%);
    font-family: var(--font-mono); font-size: var(--t-sm); color: var(--ink-3);
    padding: var(--s-3) var(--s-4); background: var(--bg-soft);
    border: 1px solid var(--line); border-radius: var(--radius);
    max-width: 80%;
  }
  .boot-status.error { color: var(--err); border-color: color-mix(in srgb, var(--err) 35%, transparent); white-space: pre-wrap; }
</style>
</head>
<body>
  <div id="bootStatus" class="boot-status">booting…</div>

  <div class="app" id="app" data-left-open="true" data-right-open="true" hidden>
    <header class="app-header">
      <button class="icon-btn" id="toggleLeft" aria-label="Toggle modes" title="Toggle modes">☰</button>
      <span class="brand">workbook<span class="accent">/</span>chat</span>
      <span class="mode-pill" id="modePill"><span class="glyph">●</span><span id="modeName">…</span></span>
      <span class="grow"></span>
      <span class="key-state unset" id="keyState">no key</span>
      <button class="icon-btn" id="toggleRight" aria-label="Toggle inspector" title="Toggle inspector">ⓘ</button>
    </header>

    <aside class="leftnav">
      <div class="leftnav-section">modes</div>
      <div id="modeList"></div>

      <div class="leftnav-section">provider</div>
      <div class="key-input">
        <div class="hint">openrouter api key</div>
        <input id="apiKey" type="password" placeholder="sk-or-…" autocomplete="off"/>
      </div>

      <div class="leftnav-section">workbook</div>
      <div class="key-input">
        <button id="saveWb" class="small-btn">save .workbook.html</button>
        <button id="clearWb" class="small-btn" style="margin-top:6px;">reset vfs + history</button>
      </div>

      <div class="leftnav-section">about</div>
      <div style="padding: 0 var(--s-5) var(--s-5);">
        <div style="font-size: var(--t-xs); color: var(--ink-3); line-height: 1.5;">
          <a href="../runner/" style="color: var(--ink-2);">runner</a> ·
          <a href="../html-agent/" style="color: var(--ink-2);">html agent</a> ·
          <a href="../sentence-search/" style="color: var(--ink-2);">embeddings</a><br/>
          <a href="https://github.com/zaius-labs/workbooks" target="_blank" style="color: var(--ink-3);">github</a>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="chat-scroll" id="chatScroll">
        <div class="chat-inner" id="chatInner"></div>
      </div>
      <div class="compose">
        <div class="compose-inner">
          <textarea id="input" rows="1" placeholder="message…"></textarea>
          <button class="send-btn" id="send" aria-label="Send" title="Send (⌘↩)">↑</button>
          <button class="stop-btn" id="stop" aria-label="Stop" title="Stop" style="display:none;">■</button>
        </div>
      </div>
    </main>

    <aside class="rightpanel" id="rightpanel">
      <div class="panel-section">
        <h3>mode</h3>
        <div class="panel-meta">
          <span><strong id="panelModeName">—</strong></span>
          <span>model · <strong id="panelModel">—</strong></span>
          <span>iter cap · <strong>20</strong></span>
        </div>
      </div>
      <div class="panel-section">
        <h3>system prompt</h3>
        <div class="panel-system" id="panelSystem">—</div>
      </div>
      <div class="panel-section">
        <h3>tools</h3>
        <div class="tool-list" id="panelTools"></div>
      </div>
      <div class="panel-section">
        <h3>vfs · <span id="vfsStats" style="color: var(--ink-4); font-weight: 400; text-transform: none; letter-spacing: 0;">0 files</span></h3>
        <div class="vfs-tree" id="vfsTree"><div class="empty">empty</div></div>
      </div>
    </aside>
  </div>

  <!--
    Optional inlined assets: present in the .workbook.html portable
    build, absent in source-tree mode. Boot script branches on
    presence. Type=text/plain so the browser doesn't try to execute
    these or treat them as JSON.
  -->
  <!-- <script id="wasm-b64" type="text/plain"></script> -->
  <!-- <script id="bindgen-src" type="text/plain"></script> -->
  <!-- <script id="runtime-bundle-src" type="text/plain"></script> -->

  <script type="module">
    // ─── Boot: dual-mode loader ────────────────────────────────
    // Source-tree mode: dynamic-import wasm pkg + reactive-cells bundle
    // via relative URLs.
    // Portable mode (.workbook.html): inlined script tags carry the
    // wasm bytes (base64) + bindgen JS source + bundle source. Decode
    // and import via blob: URLs. Same downstream surface either way.
    const bootEl = document.getElementById("bootStatus");
    const setBoot = (msg, isErr = false) => {
      bootEl.textContent = msg;
      bootEl.classList.toggle("error", !!isErr);
    };

    function base64ToBytes(b64) {
      const s = b64.trim();
      const bin = atob(s);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    let wasm, bundle;
    try {
      const wasmB64El = document.getElementById("wasm-b64");
      const bindgenSrcEl = document.getElementById("bindgen-src");
      const bundleSrcEl = document.getElementById("runtime-bundle-src");
      const portable = !!(wasmB64El && bindgenSrcEl && bundleSrcEl
        && wasmB64El.textContent.trim().length > 0);

      if (portable) {
        setBoot("portable mode · decoding wasm…");
        const wasmBytes = base64ToBytes(wasmB64El.textContent);
        const bindgenUrl = URL.createObjectURL(new Blob([bindgenSrcEl.textContent], { type: "application/javascript" }));
        wasm = await import(bindgenUrl);
        await wasm.default(wasmBytes);
        URL.revokeObjectURL(bindgenUrl);
        const bundleUrl = URL.createObjectURL(new Blob([bundleSrcEl.textContent], { type: "application/javascript" }));
        bundle = await import(bundleUrl);
        URL.revokeObjectURL(bundleUrl);
      } else {
        setBoot("loading wasm…");
        wasm = await import("../../pkg/workbook_runtime.js");
        await wasm.default();
        setBoot("loading runtime bundle…");
        bundle = await import("../reactive-cells/runtime.bundle.js");
      }
    } catch (err) {
      setBoot("boot failed: " + (err?.stack || err?.message || String(err)), true);
      throw err;
    }

    const { runAgentLoop, createBrowserLlmClient, renderMarkdown } = bundle;

    // ─── Slug + embedded-spec hydration ────────────────────────
    // Saved .workbook.html files carry a JSON blob in a script tag
    // with id "workbook-spec" — vfs + threads + currentMode + env decls.
    // Never carries secret values — see stripSecrets() in the saver.
    const SLUG = "chat-app";
    const EMBEDDED_SPEC = (() => {
      const el = document.getElementById("workbook-spec");
      if (!el) return null;
      try { return JSON.parse(el.textContent || "{}"); } catch { return null; }
    })();

    // ─── Inline VFS (localStorage-backed) ──────────────────────
    // Small files only; quota ~5 MB across the origin. Sync API for
    // simple reads from tools; snapshot/restore for portability.
    function makeVfs() {
      const KEY_PREFIX = `${SLUG}.vfs.`;
      const META_PREFIX = `${SLUG}.vfs-meta.`;
      const listeners = new Set();
      const emit = () => { for (const l of listeners) try { l(); } catch {} };

      function normalize(p) {
        if (!p) return "/";
        if (!p.startsWith("/")) p = "/" + p;
        // collapse "//" and "/./" and trailing "/" (except root)
        p = p.replace(/\/+/g, "/").replace(/\/\.\//g, "/");
        if (p.length > 1 && p.endsWith("/")) p = p.slice(0, -1);
        return p;
      }

      function exists(path) {
        return localStorage.getItem(KEY_PREFIX + normalize(path)) !== null;
      }
      function readText(path) {
        const v = localStorage.getItem(KEY_PREFIX + normalize(path));
        if (v === null) throw new Error(`no such file: ${path}`);
        return v;
      }
      function writeText(path, content) {
        const p = normalize(path);
        const text = String(content ?? "");
        localStorage.setItem(KEY_PREFIX + p, text);
        localStorage.setItem(META_PREFIX + p, JSON.stringify({ mtime: Date.now(), size: text.length }));
        emit();
        return text.length;
      }
      function remove(path) {
        const p = normalize(path);
        if (!exists(p)) return false;
        localStorage.removeItem(KEY_PREFIX + p);
        localStorage.removeItem(META_PREFIX + p);
        emit();
        return true;
      }
      function listFiles() {
        const out = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(KEY_PREFIX)) {
            const path = k.slice(KEY_PREFIX.length);
            const meta = (() => {
              try { return JSON.parse(localStorage.getItem(META_PREFIX + path) ?? "{}"); }
              catch { return {}; }
            })();
            const v = localStorage.getItem(k) ?? "";
            out.push({ path, size: meta.size ?? v.length, mtime: meta.mtime ?? 0 });
          }
        }
        out.sort((a, b) => a.path.localeCompare(b.path));
        return out;
      }
      function clear() {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && (k.startsWith(KEY_PREFIX) || k.startsWith(META_PREFIX))) keys.push(k);
        }
        for (const k of keys) localStorage.removeItem(k);
        emit();
      }
      function snapshot() {
        // Plain JSON: paths + UTF-16 string contents. Workbook spec
        // serialization, not OPFS-bytes.
        return {
          version: 1,
          createdAt: new Date().toISOString(),
          files: listFiles().map(({ path, mtime }) => ({
            path,
            content: readText(path),
            mtime,
          })),
        };
      }
      function restore(snap) {
        clear();
        for (const f of snap?.files ?? []) {
          if (typeof f?.path === "string" && typeof f?.content === "string") {
            writeText(f.path, f.content);
          }
        }
      }
      function onChange(fn) { listeners.add(fn); return () => listeners.delete(fn); }

      return { exists, readText, writeText, remove, listFiles, clear, snapshot, restore, onChange, normalize };
    }
    const vfs = makeVfs();

    // ─── Inline bash (minimal) ─────────────────────────────────
    // Small subset of POSIX-y commands operating on the VFS. Supports
    // && chaining and > / >> redirection. cwd is shell-local state.
    function makeShell(vfs) {
      let cwd = "/workspace";

      function resolve(p) {
        if (!p) return cwd;
        if (p.startsWith("/")) return vfs.normalize(p);
        // Join cwd + p, then normalize.
        const joined = (cwd === "/" ? "" : cwd) + "/" + p;
        // collapse ".." segments
        const parts = joined.split("/").filter(Boolean);
        const out = [];
        for (const seg of parts) {
          if (seg === ".") continue;
          if (seg === "..") { out.pop(); continue; }
          out.push(seg);
        }
        return "/" + out.join("/");
      }

      function listDir(dir) {
        const d = resolve(dir);
        const prefix = d === "/" ? "/" : d + "/";
        const direct = new Set();
        for (const { path } of vfs.listFiles()) {
          if (!path.startsWith(prefix)) continue;
          const rest = path.slice(prefix.length);
          const slash = rest.indexOf("/");
          direct.add(slash === -1 ? rest : rest.slice(0, slash) + "/");
        }
        return [...direct].sort();
      }

      function tokenize(line) {
        // Minimal tokenizer: respects single + double quotes; no var
        // expansion. Operators: > >> && treated as separate tokens.
        const tokens = [];
        let cur = ""; let inS = false; let inD = false;
        const flush = () => { if (cur.length) { tokens.push(cur); cur = ""; } };
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (inS) { if (c === "'") inS = false; else cur += c; continue; }
          if (inD) { if (c === '"') inD = false; else cur += c; continue; }
          if (c === "'") { inS = true; continue; }
          if (c === '"') { inD = true; continue; }
          if (c === " " || c === "\t") { flush(); continue; }
          if (c === ">" && line[i+1] === ">") { flush(); tokens.push(">>"); i++; continue; }
          if (c === ">") { flush(); tokens.push(">"); continue; }
          if (c === "&" && line[i+1] === "&") { flush(); tokens.push("&&"); i++; continue; }
          cur += c;
        }
        flush();
        return tokens;
      }

      function splitOn(tokens, sep) {
        const out = [[]]; for (const t of tokens) { if (t === sep) out.push([]); else out[out.length-1].push(t); }
        return out;
      }

      function runOne(tokens) {
        // Pull off any redirection at the end.
        let redir = null;
        for (let i = tokens.length - 2; i >= 0; i--) {
          if (tokens[i] === ">" || tokens[i] === ">>") {
            const target = tokens[i+1];
            redir = { mode: tokens[i] === ">>" ? "append" : "write", path: target };
            tokens = tokens.slice(0, i);
            break;
          }
        }
        if (tokens.length === 0) return "";
        const [cmd, ...args] = tokens;
        const out = dispatch(cmd, args);
        if (redir) {
          const p = resolve(redir.path);
          const prev = vfs.exists(p) && redir.mode === "append" ? vfs.readText(p) : "";
          vfs.writeText(p, prev + (out ?? ""));
          return "";
        }
        return out ?? "";
      }

      function dispatch(cmd, args) {
        switch (cmd) {
          case "pwd": return cwd;
          case "cd": { cwd = resolve(args[0] ?? "/workspace"); return ""; }
          case "ls": {
            const target = args[0] ?? cwd;
            return listDir(target).join("\n");
          }
          case "cat": {
            return args.map((a) => {
              const p = resolve(a);
              return vfs.exists(p) ? vfs.readText(p) : `cat: ${a}: no such file`;
            }).join("");
          }
          case "echo": return args.join(" ") + "\n";
          case "mkdir": return ""; // VFS is path-flat; directories implicit
          case "touch": { for (const a of args) { const p = resolve(a); if (!vfs.exists(p)) vfs.writeText(p, ""); } return ""; }
          case "rm": {
            const lines = [];
            for (const a of args) {
              if (a.startsWith("-")) continue; // ignore flags
              const p = resolve(a);
              if (!vfs.remove(p)) lines.push(`rm: ${a}: no such file`);
            }
            return lines.join("\n");
          }
          case "find": {
            const root = resolve(args[0] ?? cwd);
            const prefix = root === "/" ? "/" : root + "/";
            return vfs.listFiles().map((f) => f.path).filter((p) => p === root || p.startsWith(prefix)).join("\n");
          }
          case "grep": {
            if (args.length < 2) return "grep: usage: grep PATTERN PATH";
            const [pat, ...paths] = args;
            const re = new RegExp(pat);
            const lines = [];
            for (const a of paths) {
              const p = resolve(a);
              if (!vfs.exists(p)) { lines.push(`grep: ${a}: no such file`); continue; }
              const txt = vfs.readText(p);
              for (const ln of txt.split("\n")) if (re.test(ln)) lines.push(paths.length > 1 ? `${a}:${ln}` : ln);
            }
            return lines.join("\n");
          }
          case "head": case "tail": {
            let n = 10; let path = args[0];
            if (args[0] === "-n") { n = parseInt(args[1] ?? "10", 10) || 10; path = args[2]; }
            if (!path) return `${cmd}: usage: ${cmd} [-n N] PATH`;
            const p = resolve(path);
            if (!vfs.exists(p)) return `${cmd}: ${path}: no such file`;
            const lines = vfs.readText(p).split("\n");
            return (cmd === "head" ? lines.slice(0, n) : lines.slice(-n)).join("\n");
          }
          case "wc": {
            const path = args[0]; if (!path) return "wc: usage: wc PATH";
            const p = resolve(path);
            if (!vfs.exists(p)) return `wc: ${path}: no such file`;
            const txt = vfs.readText(p);
            const lines = txt.split("\n").length;
            const words = txt.split(/\s+/).filter(Boolean).length;
            const chars = txt.length;
            return `${lines} ${words} ${chars} ${path}`;
          }
          case "cp": case "mv": {
            const [src, dst] = args; if (!src || !dst) return `${cmd}: usage: ${cmd} SRC DST`;
            const sp = resolve(src), dp = resolve(dst);
            if (!vfs.exists(sp)) return `${cmd}: ${src}: no such file`;
            vfs.writeText(dp, vfs.readText(sp));
            if (cmd === "mv") vfs.remove(sp);
            return "";
          }
          default: return `${cmd}: command not found`;
        }
      }

      function exec(line) {
        const tokens = tokenize(String(line || "").trim());
        if (!tokens.length) return "";
        const groups = splitOn(tokens, "&&");
        const out = [];
        for (const g of groups) {
          const r = runOne(g);
          if (r) out.push(r);
        }
        return out.join("\n");
      }

      return { exec, get cwd() { return cwd; } };
    }

    // ─── Send ───────────────────────────────────────────────────
    async function send() {

      const mode = MODES[state.currentMode];

      els.input.value = "";
      autoResize();

      els.stop.style.display = "";

      // Streaming turn lives outside the persisted thread until done.
      // Segments are appended in chronological order: each tool call
      // closes the current text segment so subsequent deltas open a
      // new text node *after* the tool card. That gives the user a
      // true running narrative instead of clumped text + cards.
      const streamingTurn = document.createElement("div");
      streamingTurn.className = "turn msg-assistant streaming";
      streamingTurn.innerHTML = `<div class="turn-meta">assistant</div>`;
      const segments = [];
      let currentTextEl = null;
      function ensureTextSeg() {
        if (currentTextEl) return currentTextEl;
        const el = document.createElement("div");
        el.className = "turn-text";
        streamingTurn.appendChild(el);
        currentTextEl = el;
        const seg = { kind: "text", text: "", _el: el };
        segments.push(seg);
        return el;
      }
      function appendDelta(delta) {
        const el = ensureTextSeg();
        const seg = segments[segments.length - 1];
        if (seg && seg.kind === "text") {
          seg.text += delta;
          // Re-render the whole segment each delta. O(n²) total in
          // segment length; chat-sized text it's fine and lets
          // partial markdown (e.g. an unclosed code fence) recover
          // cleanly when later tokens arrive.
          el.innerHTML = renderMarkdown(seg.text);
        }
        els.chatScroll.scrollTop = els.chatScroll.scrollHeight;
      }
      function appendTool(step) {
        currentTextEl = null;
        streamingTurn.appendChild(renderToolStep(step));
        segments.push({ kind: "tool", name: step.name, argumentsJson: step.argumentsJson, result: step.result });
        els.chatScroll.scrollTop = els.chatScroll.scrollHeight;
      }

      renderHistory(streamingTurn);
      const tools = mode.tools.map((tn) => allTools[tn]).filter(Boolean);

      try {
        const result = await runAgentLoop({
          llmClient: state.llmClient,
          model: mode.model,
          systemPrompt: mode.system,
          initialUserMessage: buildPromptWithHistory(thread, mode),
          tools,
          maxIterations: 20,
          onDelta: appendDelta,
          onToolCall: (call, result) => appendTool({
            name: call.name, argumentsJson: call.argumentsJson, result,
          }),
        });
        // If runAgentLoop returned text we never streamed (tool-only
        // turn ending in a final synthesis), make sure it lands in
        // the last text segment.
        const lastSeg = segments[segments.length - 1];
        if (result?.text && (!lastSeg || lastSeg.kind !== "text" || !lastSeg.text)) {
          appendDelta(result.text);
        }
        // Strip the live DOM refs before persisting.
        const clean = segments.map((s) => s.kind === "text"
          ? { kind: "text", text: s.text }
          : { kind: "tool", name: s.name, argumentsJson: s.argumentsJson, result: s.result });
        thread.push({ role: "assistant", segments: clean });
        persistThread();
      } catch (err) {
        appendDelta(`\n[error] ${err instanceof Error ? err.message : String(err)}`);
        const clean = segments.map((s) => s.kind === "text"
          ? { kind: "text", text: s.text }
          : { kind: "tool", name: s.name, argumentsJson: s.argumentsJson, result: s.result });
        thread.push({ role: "assistant", segments: clean });
      } finally {
        els.send.style.display = "";
        els.stop.style.display = "none";
        renderHistory();
        renderVfs();
        els.input.focus();
      }
    }

    function buildPromptWithHistory(thread, mode) {
      // The runtime's runAgentLoop accepts a single `initialUserMessage`,
      // so we flatten prior turns into a single rolling prompt. Tool
      // segments collapse to a one-line marker since the model already
      // saw their results in earlier turns.
      const flatten = (m) => {
        if (m.role === "user") return `User: ${m.content}`;
        if (Array.isArray(m.segments)) {
          return "Assistant: " + m.segments.map((s) =>
            s.kind === "text" ? s.text
              : `[used tool ${s.name}]`
          ).join("").trim();
        }
        return `Assistant: ${m.content ?? ""}`;
      };
      if (thread.length === 1) return thread[0].content;
      const hist = thread.slice(0, -1).map(flatten).join("\n\n");
      const last = thread[thread.length - 1].content;
      return `Earlier conversation:\n\n${hist}\n\nCurrent message:\n\n${last}`;
    }

    function persistThread() {
      try {
        localStorage.setItem(`thread.${SLUG}.${state.currentMode}`, JSON.stringify(state.threads[state.currentMode]));
      } catch { /* quota; non-fatal */ }
    }

    function flashKeyHint() {
      els.keyState.textContent = "paste an api key →";
      els.app.dataset.leftOpen = "true";
      syncPanelButtons();
      els.apiKey.focus();
      setTimeout(() => renderHeader(), 1800);
    }

    els.send.addEventListener("click", send);
    els.stop.addEventListener("click", () => state.activeAbort?.abort());
    els.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); send(); }
    });
    els.input.addEventListener("input", autoResize);
    function autoResize() {
      els.input.style.height = "auto";
      els.input.style.height = Math.min(els.input.scrollHeight, 192) + "px";
    }

    // ─── Save / Reset ──────────────────────────────────────────
    // Discipline boundary for serialization. Drops any field declared
    // secret:true. Today MANIFEST_ENV declarations don't carry .value
    // at all, but stripSecrets is the single point that future env
    // additions have to clear before going to disk.
    function stripSecrets(spec) {
      const out = JSON.parse(JSON.stringify(spec));
      const env = out.manifest?.env;
      if (env) {
        for (const decl of Object.values(env)) {
          if (decl && decl.secret) delete decl.value;
        }
      }
      return out;
    }

    function escapeScript(s) {
      // Prevent a literal closing-script tag in JSON or asset bodies
      // from terminating the script we inject them into. The HTML
      // parser scans raw source for that substring even inside JS
      // strings, so the only safe form is the escaped one we
      // produce here.
      return String(s).replace(/<\/script/gi, "<\\/script");
    }

    function uint8ToBase64(arr) {
      const CHUNK = 0x8000;
      let s = "";
      for (let i = 0; i < arr.length; i += CHUNK) {
        s += String.fromCharCode.apply(null, arr.subarray(i, i + CHUNK));
      }
      return btoa(s);
    }
    async function fetchText(p) {
      const r = await fetch(p, { cache: "no-store" });
      if (!r.ok) throw new Error(`fetch ${p} → ${r.status}`);
      return r.text();
    }
    async function fetchBytes(p) {
      const r = await fetch(p, { cache: "no-store" });
      if (!r.ok) throw new Error(`fetch ${p} → ${r.status}`);
      return new Uint8Array(await r.arrayBuffer());
    }

    // Build HTML-parser-state-machine trigger substrings at runtime.
    // Writing them literally in source — even inside a JS comment or
    // string — puts the page's own parser into the "script data
    // escaped" state and can prematurely close the script. The
    // triggers we keep out of source are: HTML-comment open / close,
    // and script / style open / close tag substrings.
    const COM_OPEN  = "<" + "!" + "--";
    const COM_CLOSE = "--" + ">";
    const STYLE_CLOSE      = "<" + "/style>";
    const HEAD_CLOSE       = "<" + "/head>";
    const TAG_SCRIPT_OPEN  = "<" + "script";
    const TAG_SCRIPT_CLOSE = "<" + "/script>";
    const BEGIN = COM_OPEN + " portable-assets-begin " + COM_CLOSE;
    const END   = COM_OPEN + " portable-assets-end "   + COM_CLOSE;

    function injectAssets(html, assets, spec) {
      // Replace <link rel="stylesheet" href="../_shared/design.css">
      // with an inlined <style>.
      html = html.replace(
        /<link[^>]+id=["']workbook-design-css["'][^>]*>/i,
        `<style id="workbook-design-css">${assets.designCss}${STYLE_CLOSE}`,
      );
      // Strip wasm-bindgen's `new URL(..., import.meta.url)` because
      // import.meta.url is opaque inside a blob: module. We pass
      // bytes directly to init() so the URL line never executes —
      // but it does parse, and that's the failure mode.
      const safeBindgen = assets.bindgenJs.replace(
        /new URL\([\s\S]*?import\.meta\.url\)/g,
        "undefined /* stripped: caller supplies bytes */",
      );
      const tagSpec = `${TAG_SCRIPT_OPEN} id="workbook-spec" type="application/json">${escapeScript(JSON.stringify(spec))}${TAG_SCRIPT_CLOSE}`;
      const tagWasm = `${TAG_SCRIPT_OPEN} id="wasm-b64" type="text/plain">${assets.wasmB64}${TAG_SCRIPT_CLOSE}`;
      const tagBindgen = `${TAG_SCRIPT_OPEN} id="bindgen-src" type="text/plain">${escapeScript(safeBindgen)}${TAG_SCRIPT_CLOSE}`;
      const tagBundle = `${TAG_SCRIPT_OPEN} id="runtime-bundle-src" type="text/plain">${escapeScript(assets.bundleSrc)}${TAG_SCRIPT_CLOSE}`;
      const block = [tagSpec, tagWasm, tagBindgen, tagBundle].join("\n");
      // Replace any prior portable block, else insert before the
      // close-head tag. We build the regex from the same runtime-
      // assembled substrings so this source code never contains a
      // literal HTML-comment-open or close-script substring (which
      // would otherwise fight the page's own parser; see COM_OPEN).
      const escapeRe = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const existing = new RegExp(escapeRe(BEGIN) + "[\\s\\S]*?" + escapeRe(END), "i");
      const wrapped = `${BEGIN}\n${block}\n${END}`;
      if (existing.test(html)) return html.replace(existing, wrapped);
      return html.replace(new RegExp(escapeRe(HEAD_CLOSE), "i"), wrapped + "\n" + HEAD_CLOSE);
    }

    function showHint(text, isErr) {
      const id = "wb-hint";
      const prev = document.getElementById(id);
      if (prev) prev.remove();
      const div = document.createElement("div");
      div.id = id;
      div.className = "boot-status";
      if (isErr) div.classList.add("error");
      div.style.position = "fixed";
      div.style.left = "50%";
      div.style.bottom = "32px";
      div.style.top = "auto";
      div.style.transform = "translateX(-50%)";
      div.textContent = text;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }

    els.saveWb.addEventListener("click", async () => {
      const envDecls = {};
      for (const [k, v] of Object.entries(MANIFEST_ENV)) envDecls[k] = { ...v };
      const spec = stripSecrets({
        manifest: {
          name: "chat-app",
          slug: SLUG,
          version: "0.1",
          env: envDecls,
          vfs: vfs.snapshot(),
          thread: state.threads,
          currentMode: state.currentMode,
        },
        cells: [],
        inputs: {},
      });

      showHint("building portable html — fetching wasm + bundle…");
      try {
        // In source-tree mode the assets sit at known relative paths.
        // In portable mode, the page already has them inlined — just
        // re-use what's in the DOM so re-saves work without network.
        let assets;
        const wasmB64El = document.getElementById("wasm-b64");
        const bindgenSrcEl = document.getElementById("bindgen-src");
        const bundleSrcEl = document.getElementById("runtime-bundle-src");
        const designCssEl = document.querySelector("style#workbook-design-css");
        const inDom = wasmB64El && bindgenSrcEl && bundleSrcEl && designCssEl
          && wasmB64El.textContent.trim().length > 0;

        if (inDom) {
          assets = {
            wasmB64: wasmB64El.textContent,
            bindgenJs: bindgenSrcEl.textContent,
            bundleSrc: bundleSrcEl.textContent,
            designCss: designCssEl.textContent,
          };
        } else {
          const [designCss, bindgenJs, bundleSrc, wasmBytes] = await Promise.all([
            fetchText("../_shared/design.css"),
            fetchText("../../pkg/workbook_runtime.js"),
            fetchText("../reactive-cells/runtime.bundle.js"),
            fetchBytes("../../pkg/workbook_runtime_bg.wasm"),
          ]);
          assets = {
            wasmB64: uint8ToBase64(wasmBytes),
            bindgenJs,
            bundleSrc,
            designCss,
          };
        }

        // Pull a clean copy of our own HTML (no captured DOM state).
        let html;
        try {
          html = await fetchText(location.href);
        } catch {
          html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        }
        const out = injectAssets(html, assets, spec);
        const blob = new Blob([out], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "chat-app.workbook.html";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 60_000);
        const sizeMb = (out.length / 1024 / 1024).toFixed(1);
        showHint(`saved · ${sizeMb} MB · double-click the file to run.`);
      } catch (e) {
        showHint(`save failed: ${e?.message ?? e}`, true);
      }
    });

    els.clearWb.addEventListener("click", async () => {
      if (!confirm("Reset VFS and chat history? Files in /workspace will be deleted.")) return;
      vfs.clear();
      vfs.writeText("/workspace/customers.csv", SAMPLE_CSV);
      vfs.writeText("/workspace/notes.md", "# Notes\n\nThis workbook tracks customer revenue + churn by region.\n");
      for (const k of Object.keys(state.threads)) {
        state.threads[k] = [];
        localStorage.removeItem(`thread.${SLUG}.${k}`);
      }
      renderHistory();
      renderVfs();
    });

    // ─── Helpers ────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => (
        c === "&" ? "&amp;"
          : c === "<" ? "&lt;"
            : c === ">" ? "&gt;"
              : c === '"' ? "&quot;"
                : "&#39;"
      ));
    }

    // renderMarkdown is destructured from the runtime bundle (see boot).
    // Source of truth: packages/runtime/src/markdown.ts.

    function truncate(s, n) {
      const str = String(s ?? "");
      return str.length > n ? str.slice(0, n - 1) + "…" : str;
    }
    function formatBytes(n) {
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(2)} MB`;
    }

    // ─── Boot finish ───────────────────────────────────────────
    bootEl.remove();
    els.app.hidden = false;
    renderModeList();
    renderHeader();
    renderInspector();
    renderHistory();
    renderVfs();
    els.input.focus();
  </script>
</body>
</html>
